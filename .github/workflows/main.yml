name: 🕷️ News Scraper

on:
  # 1. Manual Trigger (for testing)
  workflow_dispatch:
  
  # 2. Scheduled Trigger (Runs every 30 minutes)
  schedule:
    - cron: '*/30 * * * *'  # UTC time (Adjust for BD time: UTC+6)

# Prevent overlapping runs
concurrency:
  group: scraper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Prevent hanging
    
    steps:
      # 1. Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run Scraper with Secrets
      - name: Run News Scraper
        env:
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL_PROD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_COLLECTION: ${{ secrets.DATABASE_COLLECTION }}
        run: |
          echo "🚀 Starting scraper at $(date)"
          python main.py
          echo "✅ Scraper finished at $(date)"

      # 5. Error Notification (Optional)
      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Scraper failed! Check GitHub Actions logs."
          # Add webhook/Slack/Discord notification here if needed
